version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: testhub_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: testhub
      POSTGRES_USER: testhub
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - testhub_net

  backend:
    build: ./backend
    container_name: testhub_backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://testhub:${DB_PASSWORD}@postgres:5432/testhub
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      NODE_ENV: production
      ESKIZ_EMAIL: ${ESKIZ_EMAIL}
      ESKIZ_PASSWORD: ${ESKIZ_PASSWORD}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID}
      R2_ACCESS_KEY: ${R2_ACCESS_KEY}
      R2_SECRET_KEY: ${R2_SECRET_KEY}
      R2_BUCKET: ${R2_BUCKET}
      R2_PUBLIC_URL: ${R2_PUBLIC_URL}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      FRONTEND_URL: ${FRONTEND_URL}
    networks:
      - testhub_net

  frontend:
    build: ./frontend
    container_name: testhub_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
    networks:
      - testhub_net

  nginx:
    image: nginx:alpine
    container_name: testhub_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - certbot_www:/var/www/certbot
    depends_on:
      - backend
      - frontend
    networks:
      - testhub_net

volumes:
  postgres_data:
  certbot_www:

networks:
  testhub_net:
    driver: bridge
